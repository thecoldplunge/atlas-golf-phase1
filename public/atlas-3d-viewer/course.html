            ball.position.z += vel.z * dt;
            if (ball.position.y <= BALL_RADIUS) {
              ball.position.y = BALL_RADIUS;
              const landLie = lieAt(ball.position.x, ball.position.z, HOLE);
              const horizSpeed = Math.hypot(vel.x, vel.z);

              // Water landing: splash, immediate stop, finishTurn applies penalty.
              if (landLie === 'water') {
                spawnWaterSplash(ball.position.x, ball.position.z);
                vel.set(0, 0, 0);
                finishTurn();
                return requestAnimationFrame(tick);
              }

              // Direct-into-cup: holed-out approach
              const dCup = dist2D(ball.position.x, ball.position.z, HOLE.cup.x, HOLE.cup.z);
              if (dCup < CUP_RADIUS_PHYS && horizSpeed < MAX_SINK_SPEED) {
                startSink();
                return requestAnimationFrame(tick);
              }

              const lp = LIE_PHYS[landLie] || LIE_PHYS.fairway;
              const impactVY = -vel.y;              // downward speed at contact (positive)
              const totalSpeed = Math.hypot(horizSpeed, impactVY);
              const steepness = totalSpeed > 0 ? impactVY / totalSpeed : 0;
              const spin = ball.userData.spin ?? 0;
              const ld = ball.userData.launchDir || { x: 0, z: 0 };

              // Spin-back: on green (or near-green) with high-spin shot, apply a
              // reverse-of-launch impulse scaled by spin + steepness of descent.
              // Bunker/rough kill spin → spinBackFactor is 0 there.
              if (spin > 0.35 && lp.spinBackFactor > 0) {
                const spinEffect = spin * lp.spinBackFactor * steepness;
                // Kill forward velocity proportionally, then apply backward kick.
                const forwardKill = clamp(spinEffect * 1.1, 0, 0.95);
                vel.x *= (1 - forwardKill);
                vel.z *= (1 - forwardKill);
                const backKick = spinEffect * 4.5;
                vel.x -= ld.x * backKick;
                vel.z -= ld.z * backKick;
                ball.userData.spin *= 0.5; // bleed spin on contact
              }

              // Bounce: invert vertical w/ COR, apply per-lie horizontal friction
              vel.y = impactVY * lp.cor;
              vel.x *= lp.horizFriction;
              vel.z *= lp.horizFriction;
              ball.userData.bounces = (ball.userData.bounces ?? 0) + 1;

              // If bounce is too small, transition to rolling or stop
              const postHoriz = Math.hypot(vel.x, vel.z);
              if (vel.y < 0.75 || ball.userData.bounces > 6) {
                vel.y = 0;
                if (postHoriz > 0.35) {
                  ball.userData.rollDecay = lp.rollDecel;
                  state = 'rolling';
                } else {
                  vel.set(0, 0, 0);
                  finishTurn();
                }
              }
              // else: stay in 'flying' — gravity resumes, ball bounces again
            }
            updateHUD();
          } else if (state === 'rolling') {
            // (No cup attraction — sim physics. Ball only sinks if it actually
            // rolls into the cup on its own line.)
            ball.position.x += vel.x * dt;
            ball.position.z += vel.z * dt;
            const sp = Math.hypot(vel.x, vel.z);
            if (sp > 0.001) {
              const decel = ball.userData.rollDecay ?? 3.2;
              const nvx = vel.x / sp, nvz = vel.z / sp;
              const nsp = Math.max(0, sp - decel * dt);
              vel.x = nvx * nsp; vel.z = nvz * nsp;
            }
            const dCup = dist2D(ball.position.x, ball.position.z, HOLE.cup.x, HOLE.cup.z);
            const spNow = Math.hypot(vel.x, vel.z);
            if (lieAt(ball.position.x, ball.position.z, HOLE) === 'water') {
              spawnWaterSplash(ball.position.x, ball.position.z);
              vel.set(0, 0, 0);
              finishTurn();
            } else if (dCup < CUP_RADIUS_PHYS && spNow < MAX_SINK_SPEED) {
              startSink();
            } else if (dCup < CUP_RADIUS_PHYS && spNow < MAX_SINK_SPEED * 2.0) {
              // Lip out — ball catches the rim, pops up, slows, keeps going.
              vel.y = 1.3 + (MAX_SINK_SPEED * 2 - spNow) * 0.15;
              vel.x *= 0.55;
              vel.z *= 0.55;
              state = 'flying';
              spawnRingsAt(HOLE.cup.x, HOLE.cup.z, CUP_RADIUS_PHYS, 1, 0xffe8a0);
            } else if (spNow < 0.15) {
              vel.set(0, 0, 0);
              finishTurn();
            }
            updateHUD();
          } else if (state === 'putting') {
            // (No cup attraction — sim physics; putts must be aimed accurately.)
            ball.position.x += vel.x * dt;
            ball.position.z += vel.z * dt;
            const sp = Math.hypot(vel.x, vel.z);
            const curLie = lieAt(ball.position.x, ball.position.z, HOLE);
            if (sp > 0.001) {
              const decel = curLie === 'green' ? 3.2 : 6.0;
              const nvx = vel.x / sp, nvz = vel.z / sp;
              const nsp = Math.max(0, sp - decel * dt);
              vel.x = nvx * nsp; vel.z = nvz * nsp;
            }
            const dCup = dist2D(ball.position.x, ball.position.z, HOLE.cup.x, HOLE.cup.z);
            if (curLie === 'water') {
              spawnWaterSplash(ball.position.x, ball.position.z);
              vel.set(0, 0, 0);
              finishTurn();
            } else if (dCup < CUP_RADIUS_PHYS && sp < MAX_SINK_SPEED) {
              startSink();
            } else if (sp < 0.08) {
              vel.set(0, 0, 0);
              finishTurn();
            }
            updateHUD();
          } else if (state === 'sinking') {
            // Ball drops into the hole under gravity; x/z spring to center.
            const toCenterX = HOLE.cup.x - ball.position.x;
            const toCenterZ = HOLE.cup.z - ball.position.z;
            // Horizontal spring + damping (pulls ball to cup center)
            vel.x += toCenterX * 40 * dt;
            vel.z += toCenterZ * 40 * dt;
            vel.x *= Math.pow(0.02, dt);
            vel.z *= Math.pow(0.02, dt);
            // Gravity
            vel.y -= GRAVITY * 1.2 * dt;
            ball.position.x += vel.x * dt;
            ball.position.y += vel.y * dt;
            ball.position.z += vel.z * dt;
            // Hit bottom?
            if (ball.position.y <= -0.18) {
              ball.position.set(HOLE.cup.x, -0.18, HOLE.cup.z);
              vel.set(0, 0, 0);
              finishTurn();
            }
            updateHUD();
          }

          // Camera follows the ball while it's in motion. For sinking, we
          // target the cup mouth (y=0) so the camera doesn't dip underground.
          if (state === 'flying' || state === 'rolling' || state === 'putting') {
            controls.target.lerp(
              new THREE.Vector3(ball.position.x, ball.position.y, ball.position.z),
              0.18,
            );
          } else if (state === 'sinking') {
            controls.target.lerp(
              new THREE.Vector3(HOLE.cup.x, 0, HOLE.cup.z),
              0.12,
            );
          }

          // Dolly the camera in as the ball descends / slows — closer & more
          // intimate framing as it comes to rest.
          if (state === 'flying' || state === 'rolling' || state === 'putting' || state === 'sinking') {
            const offset = camera.position.clone().sub(controls.target);
            const curDist = offset.length();
            const dir = curDist < 0.01 ? new THREE.Vector3(0, 0.3, 1).normalize()
                                       : offset.clone().normalize();
            let desiredDist;
            if (state === 'flying') {
              // Far when high, close when low
              const heightFactor = clamp(ball.position.y / 22, 0, 1);
              desiredDist = lerp(7, 16, heightFactor);
            } else if (state === 'rolling') {
              const sp = Math.hypot(vel.x, vel.z);
              desiredDist = lerp(4.5, 9, clamp(sp / 10, 0, 1));
            } else if (state === 'putting') {
              const sp = Math.hypot(vel.x, vel.z);
              desiredDist = lerp(3.5, 7, clamp(sp / 6, 0, 1));
            } else { // sinking
              desiredDist = 4;
            }
            const newDist = lerp(curDist, desiredDist, Math.min(1, dt * 2.4));
            camera.position.copy(controls.target).add(dir.multiplyScalar(newDist));
            // Keep the camera well above ground even when zoomed in close —
            // otherwise the lens ends up in the grass.
            const minY = state === 'sinking' ? 2.0 : 2.6;
            if (camera.position.y < minY) camera.position.y = minY;
          }

          // Aim indicator: 3D arc tube + landing dot. Show whenever we're at
          // rest (aim or charging).
          const showAim = (state === 'aim' || state === 'charging');
          aimDot.visible = showAim;
          if (showAim) {
            const club = clubById[selectedClubId];
            const lieMul =
              lie === 'bunker' ? 0.55 :
              lie === 'rough'  ? 0.78 : 1.0;
            const carryRatio = club.carryRatio ?? 0.9;
            const pwrMul = currentPower();
            const loftOffDeg = currentLoft().offsetDeg;
            const curveFactor = currentCurve().factor;
            const fullM = club.putt
              ? PUTT_MAX_M
              : club.maxYd * carryRatio * lieMul * pwrMul * M_PER_YARD;
            const previewM = fullM * (charging ? clamp(power, 0.08, 1) : 1.0);

            const pts = [];
            const steps = 30;
            // Perpendicular-right of aim (for curve lateral)
            const rx = -aim.z, rz = aim.x;
            const CURVE_ACC = 8.0;
            if (club.putt) {
              for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                pts.push(new THREE.Vector3(
                  ball.position.x + aim.x * previewM * t,
                  BALL_RADIUS + 0.005,
                  ball.position.z + aim.z * previewM * t,
                ));
              }
            } else {
              const angle = THREE.MathUtils.degToRad(clamp(club.angleDeg + loftOffDeg, 3, 65));
              const v0 = Math.sqrt((GRAVITY * previewM) / Math.max(Math.sin(2 * angle), 0.0001));
              const vH = v0 * Math.cos(angle);
              const vU = v0 * Math.sin(angle);
              const tTotal = (2 * vU) / GRAVITY;
              for (let i = 0; i <= steps; i++) {
                const t = (i / steps) * tTotal;
                // Lateral curve offset grows with t² (constant accel)
                const lateral = 0.5 * CURVE_ACC * curveFactor * t * t;
                pts.push(new THREE.Vector3(
                  ball.position.x + aim.x * vH * t + rx * lateral,
                  Math.max(BALL_RADIUS, (vU * t) - 0.5 * GRAVITY * t * t + BALL_RADIUS),
                  ball.position.z + aim.z * vH * t + rz * lateral,
                ));
              }
            }
            // 15% of previous radius
            const r = 0.042 + (charging ? power * 0.022 : 0);
            rebuildAimTube(pts, r);
            aimTubeMat.opacity = charging ? 0.82 : 0.6;

            const end = pts[pts.length - 1];
            aimDot.position.set(end.x, 0.04, end.z);
            aimDot.scale.setScalar(charging ? (1.0 + power * 0.6) : 1.0);
          } else if (aimTube) {
            aimTube.visible = false;
          }

          // Grow the shot trail while ball is in the air / rolling / putting.
          if (state === 'flying' || state === 'rolling' || state === 'putting') {
            const last = trailPoints[trailPoints.length - 1];
            const minStep = state === 'flying' ? 0.6 : 0.35;
            if (!last || last.distanceToSquared(ball.position) > minStep * minStep) {
              trailPoints.push(ball.position.clone());
              // Trim: only keep points within 20 yd behind the ball
              while (trailPoints.length > 2 && trailPoints[0].distanceTo(ball.position) > TRAIL_MAX_DIST_M) {
                trailPoints.shift();
              }
              rebuildTrailTube();
            }
          } else if (trailTube && trailMat.opacity > 0) {
            // Fade out after the shot ends
            trailMat.opacity = Math.max(0, trailMat.opacity - dt * 1.6);
            if (trailMat.opacity <= 0.02) clearTrail();
          }

          // Ball shadow scales + fades quickly as ball rises; realistic size
          // when grounded.
          ballShadow.position.x = ball.position.x;
          ballShadow.position.z = ball.position.z;
          const h = Math.max(0, ball.position.y - BALL_RADIUS);
          // Opacity: 0.32 on ground, fades to ~0.05 by 4m height
          ballShadow.material.opacity = clamp(0.32 - h * 0.07, 0.04, 0.32);
          // Scale: 1.0 at ground, shrinks to 0.5 by 6m
          ballShadow.scale.setScalar(clamp(1.0 - h * 0.08, 0.45, 1.0));

          // Animate water: scroll the normal map UV + subtle Y bob.
          if (holeGroup && holeGroup.userData.waterMeshes) {
            const tw = performance.now() * 0.0001;
            for (const wm of holeGroup.userData.waterMeshes) {
              const n = wm.userData.normalTex;
              if (n) {
                n.offset.x = (tw * 3.2) % 1;
                n.offset.y = (tw * 2.1) % 1;
              }
              wm.position.y = wm.userData.baseY + Math.sin(performance.now() * 0.001) * 0.01;
            }
          }

          // Sink ripples — expand + fade, then dispose
          if (sinkRipples.length) {
            const now = performance.now();
            for (let i = sinkRipples.length - 1; i >= 0; i--) {
              const r = sinkRipples[i];
              const age = now - r.userData.start;
              if (age < 0) continue;
              const t = age / r.userData.duration;
              if (t >= 1) {
                r.geometry.dispose();
                r.material.dispose();
                scene.remove(r);
                sinkRipples.splice(i, 1);
                continue;
              }
              r.scale.setScalar(1 + t * 7);
              r.material.opacity = 0.85 * (1 - t);
            }
          }

          // Tree sway — gentle rotation around Z with per-instance phase.
          if (treesRef) {
            const tm = performance.now() * 0.001;
            const m4 = new THREE.Matrix4();
            const q = new THREE.Quaternion();
            const eul = new THREE.Euler();
            const p = new THREE.Vector3();
            const s = new THREE.Vector3();
            for (let i = 0; i < treesRef.data.length; i++) {
              const d = treesRef.data[i];
              const sway = Math.sin(tm * d.swaySpeed + d.swayPhase) * d.swayAmp;
              eul.set(0, 0, sway);
              q.setFromEuler(eul);
              p.set(d.x, 0, d.z);
              s.set(d.scale, d.scale, d.scale);
              m4.compose(p, q, s);
              treesRef.trunks.setMatrixAt(i, m4);
              treesRef.leaves.setMatrixAt(i, m4);
            }
            treesRef.trunks.instanceMatrix.needsUpdate = true;
            treesRef.leaves.instanceMatrix.needsUpdate = true;
          }

          // Birds — orbit + wing flap
          {
            const tm = performance.now() * 0.001;
            for (const bird of birds) {
              const u = bird.userData;
              const theta = tm * u.angVel + u.phase;
              bird.position.set(
                u.cx + Math.cos(theta) * u.r,
                u.y,
                u.cz + Math.sin(theta) * u.r,
              );
              // Face tangent
              const tanX = -Math.sin(theta) * Math.sign(u.angVel);
              const tanZ =  Math.cos(theta) * Math.sign(u.angVel);
              bird.rotation.y = Math.atan2(tanX, tanZ);
              // Wing flap
              const pos = bird.geometry.attributes.position;
              const flap = Math.sin(tm * u.flapSpeed + u.flapPhase) * 0.4;
              pos.setY(0, u.origPos[1] + flap);
              pos.setY(2, u.origPos[7] + flap);
              pos.needsUpdate = true;
            }
          }

          // Flag flutter — sine wave along the flag's x (distance from pole).
          if (flagMesh) {
            const t = performance.now() * 0.004;
            const pos = flagMesh.geometry.attributes.position;
            const orig = flagMesh.userData.origPos;
            for (let i = 0; i < pos.count; i++) {
              const ox = orig[i * 3];
              const oy = orig[i * 3 + 1];
              // ox ranges -0.4..0.4. Pole side = -0.4. Free edge = +0.4.
              const attach = (ox + 0.4) / 0.8; // 0 pole → 1 free
              const wave = Math.sin(t * 1.4 + ox * 10) * 0.08 * attach
                         + Math.sin(t * 2.1 + oy * 6) * 0.03 * attach;
              pos.setZ(i, wave);
              pos.setY(i, oy + Math.cos(t * 1.8 + ox * 8) * 0.015 * attach);
            }
            pos.needsUpdate = true;
            flagMesh.geometry.computeVertexNormals();
          }

          // Blowing leaves — drift with wind, respawn when out of bounds.
          if (leavesMesh && leavesData) {
            const b = leavesBounds;
            const q = new THREE.Quaternion();
            const e = new THREE.Euler();
            const m4 = new THREE.Matrix4();
            const scl = new THREE.Vector3(1, 1, 1);
            const vec = new THREE.Vector3();
            for (let i = 0; i < leavesData.length; i++) {
              const l = leavesData[i];
              l.x += l.vx * dt;
              l.y += l.vy * dt;
              l.z += l.vz * dt;
              l.rx += l.vrx * dt;
              l.ry += l.vry * dt;
              l.rz += l.vrz * dt;
              // Gentle chaos on velocities
              l.vz += (Math.random() - 0.5) * 0.2 * dt;
              if (l.y < 0.1 || l.x > b.maxX + 10 || l.x < b.minX - 10
                  || l.z < b.minZ - 10 || l.z > b.maxZ + 10) {
                l.x = b.minX + Math.random() * 10 - 8;
                l.y = 1.2 + Math.random() * 4.5;
                l.z = b.minZ + Math.random() * (b.maxZ - b.minZ);
                l.vx = 2.5 + Math.random() * 2;
                l.vy = -0.6 + Math.random() * 0.3;
                l.vz = (Math.random() - 0.5) * 0.8;
              }
              e.set(l.rx, l.ry, l.rz);
              q.setFromEuler(e);
              vec.set(l.x, l.y, l.z);
              m4.compose(vec, q, scl);
              leavesMesh.setMatrixAt(i, m4);
            }
            leavesMesh.instanceMatrix.needsUpdate = true;
          }

          controls.update();
          renderer.render(scene, camera);
          requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);

        loadingEl.classList.add('hidden');
        setTimeout(() => loadingEl.remove(), 500);
      }

      main().catch((err) => {
        loadingEl.classList.add('hidden');
        showError(`Failed to load hole:\n${err?.message || err}`);
      });
    </script>
  </body>
</html>
